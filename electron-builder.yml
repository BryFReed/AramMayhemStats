appId: com.bryfreed.arammayhemstats
productName: ARAM Mayhem Stats
directories:
  output: dist
files:
  - out/**/*
  - package.json
asarUnpack:
  - "**/*.node"
mac:
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  category: public.app-category.utilities
  hardenedRuntime: false
  gatekeeperAssess: false
  identity: null
dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
win:
  target:
    - target: portable
      arch:
        - x64
  artifactName: "${productName}-${version}-win-${arch}.${ext}"
portable:
  artifactName: "${productName}-${version}-win-${arch}.${ext}"
